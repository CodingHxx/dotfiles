conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'JetBrains Mono:size=11',
    gap_x = 30,
    gap_y = 60,
    minimum_height = 800,
    minimum_width = 300,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[
${font JetBrains Mono:size=48}${alignc}${time %H:%M}${font}
${font JetBrains Mono:size=14}${alignc}${time %S SECONDS}${font}
${hr 2}
${font JetBrains Mono:bold:size=12}SYSTEM MONITOR${font}
${hr}
CPU Usage: ${cpu cpu0}% ${alignr}${cpubar 8,120}
RAM Usage: $memperc% ($mem/$memmax) ${alignr}${membars 8,120}
Home Disk: ${fs_used_perc /}% ${alignr}${fs_bar 8,120 /}
${hr}
${font JetBrains Mono:bold:size=12}TOP CPU PROCESSES${font}
${hr}
${top name 1} ${alignr}${top cpu 1}%
${top name 2} ${alignr}${top cpu 2}%
${top name 3} ${alignr}${top cpu 3}%
]]
